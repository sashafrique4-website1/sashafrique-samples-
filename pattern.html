<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pattern — Sash Afrique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="view-pattern">

<div class="topbar"><a class="back" href="index.html">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
  Gallery
</a></div>

<div id="root"><p style="padding:40px 22px; color:rgba(255,255,255,.5);">Loading…</p></div>

<script src="patterns.js"></script>
<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const root = document.getElementById('root');
  let PATTERNS = [];
  try {
    const res = await fetch('patterns.json');
    const data = await res.json();
    PATTERNS = data.patterns || [];
  } catch (e) {
    root.innerHTML = `<div class="not-found"><p>Could not load the pattern data.</p><a href="index.html">Back to the gallery</a></div>`;
    return;
  }
  const pattern = PATTERNS.find(p => p.id === id);
  if (!pattern){
    root.innerHTML = `<div class="not-found"><p>We couldn't find that pattern.</p><a href="index.html">Back to the gallery</a></div>`;
    return;
  }
  const imgs = patternImages(pattern);
  const orderUrl = 'https://www.sashafrique.com/order';
  const waMessage = encodeURIComponent(`Hello Sash Afrique, I am interested in the ${pattern.name} pattern. Can I share my details?`);
  const waUrl = `https://wa.me/233240110854?text=${waMessage}`;

  root.innerHTML = `
    <div class="hero-frame">
      <img src="${imgs[0]}" alt="${pattern.name} kente pattern" draggable="false">
      <div class="watermark"></div>
      <div class="watermark-text">SASH AFRIQUE</div>
    </div>
    <div class="content">
      <div class="eyebrow">Graduation Collection</div>
      <h1 class="pattern-name">${pattern.name}</h1>
      <p class="story">${pattern.story}</p>
    </div>
    ${imgs.length > 1 ? `
    <div class="strip">
      ${imgs.slice(1,3).map(src => `
        <div class="strip-frame">
          <img src="${src}" alt="${pattern.name} detail" draggable="false">
          <div class="watermark"></div>
        </div>
      `).join('')}
    </div>` : ''}
    <div class="actions">
      <a class="btn-cta gold" href="${orderUrl}" target="_blank" rel="noopener">Order Online</a>
      <a class="btn-cta whatsapp" href="${waUrl}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.29-1.39a9.9 9.9 0 0 0 4.75 1.21h.01c5.46 0 9.9-4.45 9.9-9.91C21.96 6.45 17.5 2 12.04 2zm5.8 14.06c-.24.68-1.4 1.3-1.93 1.38-.5.08-1.12.11-1.8-.11-.42-.13-.96-.31-1.65-.6-2.9-1.25-4.8-4.17-4.94-4.36-.14-.19-1.18-1.57-1.18-3 0-1.42.75-2.12 1.02-2.41.27-.29.58-.36.78-.36.19 0 .39 0 .56.01.18.01.42-.07.65.5.24.58.82 2 .89 2.15.07.15.12.32.02.51-.1.19-.15.31-.3.48-.15.17-.31.37-.44.5-.15.15-.3.3-.13.6.17.29.75 1.24 1.62 2.01 1.11.99 2.05 1.3 2.34 1.44.29.15.46.13.63-.08.17-.2.72-.84.92-1.13.19-.29.38-.24.64-.14.27.1 1.68.79 1.97.93.29.15.48.22.55.34.07.13.07.72-.17 1.4z"/></svg>
        WhatsApp
      </a>
    </div>
  `;

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => {
    if (e.target && (e.target.closest('.hero-frame') || e.target.closest('.strip'))) e.preventDefault();
  });
})();
</script>
</body>
</html>
